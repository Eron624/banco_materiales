<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Banco de Materiales</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Personalizados -->
    <link rel="stylesheet" href="../includes/css/menu.css">
    <link rel="stylesheet" href="../includes/css/dashboard.css">
</head>

<body>
    <!-- Encabezado -->
    <header>
            <div class="container">
                <div class="encabezado d-flex flex-wrap justify-content-center align-items-center gap-3 p-3">
                    <img id="logo1" src="../includes/multimedia/logoTec.jpg" class="img-fluid rounded"
                        style="max-width: 200px; max-height: 80px;" alt="Tecnológico Nacional de México" title="TEC NM">
                    <img id="logo2" src="../includes/multimedia/logoTec2.jpg" class="img-fluid rounded"
                        style="max-width: 200px; max-height: 80px;" alt="Instituto Tecnológico de Chihuahua 2" title="ITCH 2">
                </div>
            </div>
        
        <div class="barraNavegacion">
            <nav>
                <ul class="menu">
                    <li><a href="dashboard.html" id="inicio-link">INICIO</a></li>
                </ul>
                
                <div id="cerrarSesion" onclick="logout()">
                    <h4>CERRAR SESIÓN</h4> 
                </div>
            </nav>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="contenedor">
        <h2 class="titulo-pagina">Banco de Materiales</h2>

        <!-- FORMULARIO DE PUBLICACIÓN -->
        <div class="tarjeta">
            <div class="tarjeta-contenido">
                <h4 class="tarjeta-titulo">Nueva publicación</h4>
                <form id="formPublicacion" onsubmit="event.preventDefault(); agregarPublicacion(event);">
                    <input class="campo-texto" type="text" placeholder="Título del material" id="titulo" required maxlength="100">
                    <textarea class="area-texto" placeholder="Descripción del material" id="descripcion" rows="3" required
                        maxlength="250"></textarea>
                    <input class="campo-archivo" type="file" id="imagen" accept="image/*">
                    <button type="submit" class="boton boton-publicar">
                        Publicar
                    </button>
                </form>
            </div>
        </div>

        <!-- PUBLICACIONES -->
        <div id="publicaciones">

        </div>
    </main>

    <dialog id='msg'>
        <h2 id='msg_titulo'>CERRAR SESIÓN</h2>
        <p id='msg_cuerpo'>¿Estás seguro de Cerrar Sesión?</p>
        <button id='msg_cerrar' class="boton msg_boton">CERRAR SESIÓN</button>
        <button id="cancelar" class="boton msg_boton" onclick="msg.close();">CANCELAR</button>
        </dialog>
        
        <dialog id='msg_3'>
            <h2 id='msg_titulo_3'></h2>
            <p id='msg_cuerpo_3'></p>
            <button id='msg_cerrar_3' class="boton msg_boton" onclick="msg_3.close();">CERRAR</button>
        </dialog>
        
        <dialog id='msg_4'>
            <h2 id='msg_titulo_4'>SEGURO DE ELIMINAR?</h2>
            <p id='msg_cuerpo_4'>ESTA ACCIÓN ES IRREVERSIBLE Y SE PERDERA LA INFORMACIÓN PARA SIEMPRE</p>
            <button id='msg_eliminar' class="boton msg_boton" onclick="">ELIMINAR PUBLICACIÓN</button>
            <button id="cancelar_4" class="boton msg_boton" onclick="msg_4.close();">CANCELAR</button>
    </dialog>
        <dialog id='msg_5'>
            <h2 id='msg_titulo_5'>SEGURO DE ELIMINAR?</h2>
            <p id='msg_cuerpo_5'>ESTA ACCIÓN ES IRREVERSIBLE Y SE PERDERA LA INFORMACIÓN PARA SIEMPRE</p>
            <button id='msg_eliminar_5' class="boton msg_boton" onclick="">ELIMINAR COMENTARIO</button>
            <button id="cancelar_5" class="boton msg_boton" onclick="msg_5.close();">CANCELAR</button>
        </dialog>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../includes/js/dashboardJS.js"></script>
</body>
</html>
