<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Materiales</title>
    <link rel="stylesheet" href="./includes/css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<body>
    <!-- Encabezado -->
    <header>
        <div class="encabezado">
            <img id="logo1" src="./includes/multimedia/logoTec.jpg" alt="Tecnológico Nacional de México" title="TEC NM">
            <img id="logo2" src="./includes/multimedia/logoTec2.jpg" alt="Instituto Tecnológico de Chihuahua 2"
                title="ITCH 2">
        </div>
    </header>


    <!-- Inicio de sesión -->
    <div class="login-container">
        <h2>Iniciar Sesión</h2>

        <form id="loginForm" action="/login" method="POST">
            <div class="form-group">
                <label for="user">Usuario:</label>
                <input type="user" id="user" name="user" placeholder="Ej. 23550741" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>

            <button type="submit">Iniciar Sesión</button>

            <div class="links">
                <a href="#">Registrarse</a>
            </div>
        </form>
    </div>


</body>

</html>
