<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Materiales</title>
    <link rel="stylesheet" href="./includes/css/login.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<body>
    <!-- Encabezado -->
    <header>
        <div class="container">
            <div class="encabezado d-flex flex-wrap justify-content-center align-items-center gap-3 p-3">
                <img id="logo1" src="./includes/multimedia/logoTec.jpg" class="img-fluid rounded"
                    style="max-width: 200px; max-height: 80px;" alt="Tecnológico Nacional de México" title="TEC NM">
                <img id="logo2" src="./includes/multimedia/logoTec2.jpg" class="img-fluid rounded"
                    style="max-width: 200px; max-height: 80px;" alt="Instituto Tecnológico de Chihuahua 2" title="ITCH 2">
            </div>
        </div>
    </header>


    <!-- Inicio de sesión -->
    <div class="login-container">
        <h2>Iniciar Sesión</h2>

        <form id="loginForm" onsubmit="event.preventDefault(); login();" method="POST">
            <div class="form-group">
                <label for="usuario">Usuario:</label>
                <input type="user" id="usuario" name="usuario" placeholder="Ej. 23550741" required>
            </div>

            <div class="form-group">
                <label for="contrase">Contraseña:</label>
                <input type="password" id="contrase" name="contrase" placeholder="Ingresa tu contraseña" required>
            </div>

            <button type="submit">Iniciar Sesión</button>

            <div class="links">
                <a href="#" onclick="dialogRegistro.showModal(); return false;">Registrarse</a>
            </div>
        </form>
    </div>
<script src="./includes/js/indexJS.js" defer></script>
<dialog id='msg' class="p-0 border-0 rounded-3 shadow-lg">
    <div class="modal-content p-4" style="min-width: 300px;">
        <h2 id='msg_titulo' class="h4 mb-3"></h2>
        <p id='msg_cuerpo' class="mb-4"></p>
        <div class="d-flex gap-2 justify-content-end">
            <button id="msg_cerrar" class="btn btn-secondary" onclick="msg.close();">CERRAR</button>
        </div>
    </div>
</dialog>
<dialog id='msg_2' class="p-0 border-0 rounded-3 shadow-lg">
    <div class="modal-content p-4" style="min-width: 300px;">
        <h2 id='msg_titulo_2' class="h4 mb-3"></h2>
        <p id='msg_cuerpo_2' class="mb-4"></p>
        <div class="d-flex gap-2 justify-content-end">
            <button id="msg_cerrar_2" class="btn btn-secondary" onclick="msg_2.close();">CERRAR</button>
        </div>
    </div>
</dialog>
<dialog id='msg_3' class="p-0 border-0 rounded-3 shadow-lg">
    <div class="modal-content p-4" style="min-width: 300px;">
        <h2 id='msg_titulo_3' class="h4 mb-3"></h2>
        <p id='msg_cuerpo_3' class="mb-4"></p>
        <div class="d-flex gap-2 justify-content-end">
            <button id="msg_cerrar_3" class="btn btn-secondary" onclick="msg_3.close();">CERRAR</button>
        </div>
    </div>
</dialog>

<dialog id='dialogRegistro'>
    <div class="modal-content">
        <h2>REGISTRAR NUEVO ESTUDIANTE</h2>

        <form class="formulario-registro" onsubmit="event.preventDefault(); registroNuevo();" id="formRegis">
            <div class="campo">
                <label for="correo">Correo</label>
                <input type="email" id="correo" name="correo" required pattern=".*@chihuahua2\.tecnm\.mx$"
                    title="El correo debe terminar en @chihuahua2.tecnm.mx" oninput="ponerNumControl()">
            </div>
            <div class="campo">
                <label for="user">Número de Control</label>
                <input type="text" id="user" name="user" readonly placeholder="Generación Automática">
            </div>

            <div class="campo">
                <label for="pass">Contraseña</label>
                <input type="password" id="pass" name="pass" required>
            </div>

            <div class="campo-doble">
                <div class="campo">
                    <label for="primer_nombre">Primer Nombre</label>
                    <input type="text" id="primer_nombre" name="primer_nombre" required>
                </div>
                <div class="campo">
                    <label for="segundo_nombre">Segundo Nombre</label>
                    <input type="text" id="segundo_nombre" name="segundo_nombre">
                </div>
            </div>

            <div class="campo-doble">
                <div class="campo">
                    <label for="apell_pat">Apellido Paterno</label>
                    <input type="text" id="apell_pat" name="apell_pat" required>
                </div>
                <div class="campo">
                    <label for="apell_mat">Apellido Materno</label>
                    <input type="text" id="apell_mat" name="apell_mat">
                </div>
            </div>

            <div class="campo">
                <label for="celular">Celular</label>
                <input type="text" id="celular" name="celular" required>
            </div>

            <div class="botones-registro">
                <button type="button" id="btnCancelarRegistro" class="boton btn-cancelar"
                    onclick="dialogRegistro.close(); formRegis.reset();">CANCELAR</button>
                <button type="submit" id="btnRegistrar" class="boton btn-registrar">REGISTRAR</button>
            </div>
            </form>
    </div>
</dialog>
<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
